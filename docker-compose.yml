services:
  app:
    build: .
    ports:
      - "5000:5000"
    env_file: .env
    volumes:
      - ./data/draw.csv:/app/data/draw.csv:ro
      - ./data/team-aliases.json:/app/data/team-aliases.json:ro
      - ./data/cache:/app/data/cache
      - ./public/profiles:/app/public/profiles:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
